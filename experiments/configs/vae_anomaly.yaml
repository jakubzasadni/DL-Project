# Konfiguracja eksperymentu VAE
experiment_name: "vae_anomaly_detection"

# Model
model:
  type: "VAE"
  input_dim: 55
  hidden_dims: [128, 64]
  latent_dim: 8
  beta: 1.0
  dropout: 0.2

# Trening
training:
  learning_rate: 0.001
  batch_size: 256
  epochs: 100
  weight_decay: 0.00001
  anomaly_mode: true

# Detekcja anomalii
anomaly_detection:
  threshold_percentile: 95.0
