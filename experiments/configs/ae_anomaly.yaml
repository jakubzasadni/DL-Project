# Konfiguracja bazowego eksperymentu AE Anomaly Detection
experiment_name: "ae_anomaly_detection"

# Model
model:
  type: "AE"
  input_dim: 55
  hidden_dims: [128, 64, 32]
  latent_dim: 8
  dropout: 0.2

# Trening
training:
  learning_rate: 0.001
  batch_size: 256
  epochs: 100
  weight_decay: 0.00001
  anomaly_mode: true  # Trening tylko na benign

# Detekcja anomalii
anomaly_detection:
  threshold_percentile: 95.0  # Percentyl błędów benign z walidacji
